name: mem0

services:
  mem0:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    expose:
      - "8000"
    labels:
      - traefik.enable=true
      - traefik.http.routers.mem0-api-mem-http.rule=Host(`api.mem.petrenko.cv`)
      - traefik.http.routers.mem0-api-mem-http.entrypoints=http
      - traefik.http.routers.mem0-api-mem-http.middlewares=redirect-to-https
      - traefik.http.routers.mem0-api-mem-http.service=mem0-api
      - traefik.http.routers.mem0-api-mem-https.rule=Host(`api.mem.petrenko.cv`)
      - traefik.http.routers.mem0-api-mem-https.entrypoints=https
      - traefik.http.routers.mem0-api-mem-https.tls=true
      - traefik.http.routers.mem0-api-mem-https.tls.certresolver=letsencrypt
      - traefik.http.routers.mem0-api-mem-https.service=mem0-api
      - traefik.http.services.mem0-api.loadbalancer.server.port=8000
      - traefik.docker.network=coolify
    networks:
      - mem0_network
      - coolify
    depends_on:
      postgres:
        condition: service_started
    command: ["sh", "/app/start.sh"]
    volumes:
      - mem0_history:/app/history
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONPATH=
      - OPENAI_API_KEY=${OPENAI_API_KEY:?}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - POSTGRES_HOST=mem0-postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=postgres
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_COLLECTION_NAME=${POSTGRES_COLLECTION_NAME:-memories}
      - APP_DB_NAME=mem0_app
      - JWT_SECRET=${JWT_SECRET:?}
      - ADMIN_API_KEY=${ADMIN_API_KEY:-}
      - AUTH_DISABLED=false
      - DASHBOARD_URL=${DASHBOARD_URL:?}
      - MEM0_DEFAULT_LLM_MODEL=${MEM0_DEFAULT_LLM_MODEL:-gpt-4.1-nano-2025-04-14}
      - MEM0_DEFAULT_EMBEDDER_MODEL=${MEM0_DEFAULT_EMBEDDER_MODEL:-text-embedding-3-small}
      - MEM0_TELEMETRY=${MEM0_TELEMETRY:-false}
      - REQUEST_LOG_RETENTION_DAYS=${REQUEST_LOG_RETENTION_DAYS:-30}
  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    restart: unless-stopped
    expose:
      - "3000"
    labels:
      - traefik.enable=true
      - traefik.http.routers.mem0-ui-mem-http.rule=Host(`mem.petrenko.cv`)
      - traefik.http.routers.mem0-ui-mem-http.entrypoints=http
      - traefik.http.routers.mem0-ui-mem-http.middlewares=redirect-to-https
      - traefik.http.routers.mem0-ui-mem-http.service=mem0-ui
      - traefik.http.routers.mem0-ui-mem-https.rule=Host(`mem.petrenko.cv`)
      - traefik.http.routers.mem0-ui-mem-https.entrypoints=https
      - traefik.http.routers.mem0-ui-mem-https.tls=true
      - traefik.http.routers.mem0-ui-mem-https.tls.certresolver=letsencrypt
      - traefik.http.routers.mem0-ui-mem-https.service=mem0-ui
      - traefik.http.services.mem0-ui.loadbalancer.server.port=3000
      - traefik.docker.network=coolify
    networks:
      - mem0_network
      - coolify
    depends_on:
      mem0:
        condition: service_started
    environment:
      - SERVICE_FQDN_DASHBOARD_3000=${MEM0_DASHBOARD_DOMAIN:-mem0.petrenko.cv}
      - NEXT_PUBLIC_API_URL=
      - API_INTERNAL_URL=http://mem0:8000
      - NEXT_PUBLIC_INSTANCE_NAME=${NEXT_PUBLIC_INSTANCE_NAME:-Mem0}
  mcp-gateway:
    build:
      context: ./mcp-gateway
      dockerfile: Dockerfile
    restart: unless-stopped
    expose:
      - "8000"
    labels:
      - traefik.enable=true
      - traefik.http.routers.mem0-mcp-mem-http.rule=Host(`mcp.mem.petrenko.cv`)
      - traefik.http.routers.mem0-mcp-mem-http.entrypoints=http
      - traefik.http.routers.mem0-mcp-mem-http.middlewares=redirect-to-https
      - traefik.http.routers.mem0-mcp-mem-http.service=mem0-mcp
      - traefik.http.routers.mem0-mcp-mem-https.rule=Host(`mcp.mem.petrenko.cv`)
      - traefik.http.routers.mem0-mcp-mem-https.entrypoints=https
      - traefik.http.routers.mem0-mcp-mem-https.tls=true
      - traefik.http.routers.mem0-mcp-mem-https.tls.certresolver=letsencrypt
      - traefik.http.routers.mem0-mcp-mem-https.service=mem0-mcp
      - traefik.http.services.mem0-mcp.loadbalancer.server.port=8000
      - traefik.docker.network=coolify
    networks:
      - mem0_network
      - coolify
    environment:
      - MEM0_SELF_HOSTED_API_URL=http://mem0:8000
      - MEM0_SELF_HOSTED_API_KEY=${MCP_MEM0_API_KEY:-${ADMIN_API_KEY:-}}
      - MCP_GATEWAY_TOKEN=${MCP_GATEWAY_TOKEN:?}
      - MCP_GATEWAY_USER_ID=${MCP_GATEWAY_USER_ID:-wiselancer}
      - MCP_GATEWAY_AGENT_ID=${MCP_GATEWAY_AGENT_ID:-agent}
      - MCP_GATEWAY_RUN_ID=${MCP_GATEWAY_RUN_ID:-}
      - MCP_GATEWAY_TOKENS=${MCP_GATEWAY_TOKENS:-}
    depends_on:
      mem0:
        condition: service_started
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    shm_size: "256mb"
    networks:
      mem0_network:
        aliases:
          - mem0-postgres
    environment:
      - POSTGRES_DB=postgres
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    volumes:
      - postgres_db_pg16_v3:/var/lib/postgresql/data
      - ./init-db.sh:/docker-entrypoint-initdb.d/init-db.sh:ro

volumes:
  postgres_db_pg16_v3:
  mem0_history:

networks:
  coolify:
    external: true
  mem0_network:
    driver: bridge
