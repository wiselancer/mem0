name: mem0

services:
  mem0:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    expose:
      - "8000"
    labels:
      - traefik.enable=true
      - traefik.http.routers.mem0-api-http.rule=Host(`mem0-api.petrenko.cv`)
      - traefik.http.routers.mem0-api-http.entrypoints=http
      - traefik.http.routers.mem0-api-http.service=mem0-api
      - traefik.http.routers.mem0-api-https.rule=Host(`mem0-api.petrenko.cv`)
      - traefik.http.routers.mem0-api-https.entrypoints=https
      - traefik.http.routers.mem0-api-https.tls=true
      - traefik.http.routers.mem0-api-https.service=mem0-api
      - traefik.http.services.mem0-api.loadbalancer.server.port=8000
      - traefik.docker.network=coolify
    networks:
      - mem0_network
      - coolify
    depends_on:
      postgres:
        condition: service_healthy
    command: |
      sh -c '
        python - <<PY
      import os, socket, time
      host = os.getenv("POSTGRES_HOST", "postgres")
      port = int(os.getenv("POSTGRES_PORT", "5432"))
      user = os.getenv("POSTGRES_USER", "postgres")
      password = os.getenv("POSTGRES_PASSWORD")
      default_db = os.getenv("POSTGRES_DB", "postgres")
      app_db = os.getenv("APP_DB_NAME", "mem0_app")
      deadline = time.time() + 180
      while True:
          try:
              with socket.create_connection((host, port), timeout=5):
                  break
          except OSError:
              if time.time() > deadline:
                  raise
              time.sleep(2)
      import psycopg
      from psycopg import sql
      with psycopg.connect(host=host, port=port, dbname=default_db, user=user, password=password, autocommit=True) as conn:
          exists = conn.execute("SELECT 1 FROM pg_database WHERE datname = %s", (app_db,)).fetchone()
          if not exists:
              conn.execute(sql.SQL("CREATE DATABASE {}").format(sql.Identifier(app_db)))
      PY
        (alembic upgrade head && uvicorn main:app --host 0.0.0.0 --port 8000) > /tmp/mem0-startup.log 2>&1 || python - <<PY
      from http.server import BaseHTTPRequestHandler, HTTPServer
      from pathlib import Path

      class Handler(BaseHTTPRequestHandler):
          def do_GET(self):
              body = Path("/tmp/mem0-startup.log").read_text(errors="replace")[-12000:]
              self.send_response(500)
              self.send_header("Content-Type", "text/plain; charset=utf-8")
              self.end_headers()
              self.wfile.write(body.encode())

      HTTPServer(("0.0.0.0", 8000), Handler).serve_forever()
      PY
      '
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONPATH=
      - OPENAI_API_KEY=${OPENAI_API_KEY:?}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-}
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=postgres
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?}
      - POSTGRES_COLLECTION_NAME=${POSTGRES_COLLECTION_NAME:-memories}
      - APP_DB_NAME=mem0_app
      - JWT_SECRET=${JWT_SECRET:?}
      - ADMIN_API_KEY=${ADMIN_API_KEY:-}
      - AUTH_DISABLED=false
      - DASHBOARD_URL=${DASHBOARD_URL:?}
      - MEM0_DEFAULT_LLM_MODEL=${MEM0_DEFAULT_LLM_MODEL:-gpt-4.1-nano-2025-04-14}
      - MEM0_DEFAULT_EMBEDDER_MODEL=${MEM0_DEFAULT_EMBEDDER_MODEL:-text-embedding-3-small}
      - MEM0_TELEMETRY=${MEM0_TELEMETRY:-false}
      - REQUEST_LOG_RETENTION_DAYS=${REQUEST_LOG_RETENTION_DAYS:-30}
  mem0-dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    restart: unless-stopped
    expose:
      - "3000"
    labels:
      - traefik.enable=true
      - traefik.http.routers.mem0-dashboard-http.rule=Host(`mem0.petrenko.cv`)
      - traefik.http.routers.mem0-dashboard-http.entrypoints=http
      - traefik.http.routers.mem0-dashboard-http.service=mem0-dashboard
      - traefik.http.routers.mem0-dashboard-https.rule=Host(`mem0.petrenko.cv`)
      - traefik.http.routers.mem0-dashboard-https.entrypoints=https
      - traefik.http.routers.mem0-dashboard-https.tls=true
      - traefik.http.routers.mem0-dashboard-https.service=mem0-dashboard
      - traefik.http.services.mem0-dashboard.loadbalancer.server.port=3000
      - traefik.docker.network=coolify
    networks:
      - mem0_network
      - coolify
    depends_on:
      mem0:
        condition: service_started
    environment:
      - NEXT_PUBLIC_API_URL=${API_URL:?}
      - API_INTERNAL_URL=http://mem0:8000
      - NEXT_PUBLIC_INSTANCE_NAME=${NEXT_PUBLIC_INSTANCE_NAME:-Mem0}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  postgres:
    image: ankane/pgvector:v0.5.1
    restart: unless-stopped
    shm_size: "256mb"
    networks:
      - mem0_network
    environment:
      - POSTGRES_DB=postgres
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -q -d \"$${POSTGRES_DB}\" -U \"$${POSTGRES_USER}\""]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s
    volumes:
      - postgres_db_v4:/var/lib/postgresql/data
      - ./init-db.sh:/docker-entrypoint-initdb.d/init-db.sh:ro

volumes:
  postgres_db_v4:

networks:
  coolify:
    external: true
  mem0_network:
    driver: bridge
